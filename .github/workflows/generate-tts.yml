name: Generate TTS audio

on:
  push:
    branches: [main]
    paths:
      - "src/content/blog/**"
      - "src/content/blog-en/**"
      - "scripts/generate-tts.mjs"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tts-audio-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tts:
    name: Generate audio assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write GCP credentials
        run: |
          printf '%s' '${{ secrets.GOOGLE_TTS_SA_KEY }}' > /tmp/gcp-tts-key.json

      - name: Generate audio
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-tts-key.json
          TTS_ENGINE_VERSION: "1"
          TTS_ES_VOICE: es-US-Neural2-A
          TTS_EN_VOICE: en-US-Neural2-F
        run: node scripts/generate-tts.mjs

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcp-tts-key.json

      - name: Commit audio files
        run: |
          git config user.name "tts-bot"
          git config user.email "tts-bot@users.noreply.github.com"
          git add public/audio/
          git diff --cached --quiet || git commit -m "chore(tts): regenerar audio [skip ci]"
          git push
