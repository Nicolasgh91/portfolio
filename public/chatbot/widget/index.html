<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Widget</title>

  <!--
    PASO 1 — Script síncrono: inyectar tokens ANTES de que chat.css pinte.
    Debe estar ANTES del <link> al CSS para que los tokens ya existan
    cuando el browser evalúe las variables en chat.css.
    NO convertir a type="module". NO mover al body. NO hacer async/defer.

    CSP: este script está inline-permitido vía sha256 hash en vercel.json
    (route /chatbot/widget/*). Si modificás el contenido, regenerá los hashes
    con `node scripts/csp-hash.mjs` y actualizá el header CSP en vercel.json.
  -->
  <script>
    (function() {
      try {
        // SEC-009: validar origen del padre antes de acceder a su DOM
        var ALLOWED_PARENTS = [
          'https://escalatunegocioconia.com', 'https://www.escalatunegocioconia.com',
          'https://escalatunegocioconia.com.ar', 'https://www.escalatunegocioconia.com.ar',
          'http://localhost:3000', 'http://localhost:4321'
        ];
        if (ALLOWED_PARENTS.indexOf(window.parent.origin) === -1) throw new Error('Origen no permitido');

        var parentHtml = window.parent.document.documentElement;

        // Sincronizar clase dark/light
        if (parentHtml.classList.contains('light'))
          document.documentElement.classList.add('light');

        // Leer tokens computados del padre e inyectarlos como :root vars
        var computed = window.parent.getComputedStyle(parentHtml);
        var tokens = [
          '--accent-h','--accent-s',
          '--accent','--accent-hover','--accent-bg','--accent-border','--accent-text',
          '--color-on-accent',
          '--btn-primary-bg','--btn-primary-bg-hover','--btn-primary-text',
          '--btn-disabled-opacity',
          '--bg-primary','--bg-secondary','--bg-tertiary','--bg-card',
          '--text-primary','--text-secondary','--text-muted',
          '--border-subtle','--border-normal','--border-strong',
          '--radius-sm','--radius-md','--radius-lg','--radius-xl','--radius-pill',
          '--sp-xs','--sp-sm','--sp-md','--sp-lg','--sp-xl',
          '--font-body','--font-display','--font-mono','--text-xs','--text-sm','--text-base','--text-lg'
        ];
        var decls = tokens.map(function(t) {
          var v = computed.getPropertyValue(t).trim();
          return v ? t + ':' + v : null;
        }).filter(Boolean).join(';');

        var s = document.createElement('style');
        s.id = 'pt'; // parent-tokens
        s.textContent = ':root{' + decls + '}';
        document.head.appendChild(s);

        // Señal para chat.css: los tokens del padre están activos,
        // no usar los fallbacks de :root:not(.tokens-ready)
        document.documentElement.classList.add('tokens-ready');

      } catch(e) {
        // Sin acceso al padre: chat.css tiene fallbacks HSL correctos
      }
    })();
  </script>

  <!-- PASO 2 — CSS carga cuando los tokens ya están disponibles -->
  <link rel="stylesheet" href="./chat.css">

  <!--
    PASO 3 — Observer para cambios de tema en tiempo real.
    Va en <head> también para que esté listo antes de cualquier interacción.
    Síncrono, no-module.
  -->
  <script>
    (function() {
      try {
        // SEC-009: validar origen del padre antes de observar su DOM
        var ALLOWED_PARENTS = [
          'https://escalatunegocioconia.com', 'https://www.escalatunegocioconia.com',
          'https://escalatunegocioconia.com.ar', 'https://www.escalatunegocioconia.com.ar',
          'http://localhost:3000', 'http://localhost:4321'
        ];
        if (ALLOWED_PARENTS.indexOf(window.parent.origin) === -1) throw new Error('Origen no permitido');

        new MutationObserver(function() {
          var parentHtml = window.parent.document.documentElement;
          document.documentElement.classList.toggle('light',
            parentHtml.classList.contains('light'));

          // Re-inyectar tokens con los valores del nuevo tema
          var old = document.getElementById('pt');
          if (old) old.remove();
          var computed = window.parent.getComputedStyle(parentHtml);
          var tokens = [
            '--accent-h','--accent-s',
            '--accent','--accent-hover','--accent-bg','--accent-border','--accent-text',
            '--color-on-accent',
            '--btn-primary-bg','--btn-primary-bg-hover','--btn-primary-text',
            '--btn-disabled-opacity',
            '--bg-primary','--bg-secondary','--bg-tertiary','--bg-card',
            '--text-primary','--text-secondary','--text-muted',
            '--border-subtle','--border-normal','--border-strong',
            '--radius-sm','--radius-md','--radius-lg','--radius-xl','--radius-pill',
            '--sp-xs','--sp-sm','--sp-md','--sp-lg','--sp-xl',
            '--font-body','--font-display','--font-mono','--text-xs','--text-sm','--text-base','--text-lg'
          ];
          var decls = tokens.map(function(t) {
            var v = computed.getPropertyValue(t).trim();
            return v ? t + ':' + v : null;
          }).filter(Boolean).join(';');
          var s = document.createElement('style');
          s.id = 'pt';
          s.textContent = ':root{' + decls + '}';
          document.head.appendChild(s);
        }).observe(
          window.parent.document.documentElement,
          { attributes: true, attributeFilter: ['class'] }
        );
      } catch(e) {}
    })();
  </script>
</head>
<body>

  <!-- ── Botón flotante ── -->
  <button type="button" id="chat-trigger" aria-label="Abrir chat" aria-expanded="false" aria-controls="chat-window">
    <span id="chat-badge" style="opacity:0">1</span>
    <span class="trigger-logo">nh<span class="trigger-logo-dot">.</span></span>
    <span class="trigger-bubble" aria-hidden="true">
      <span class="trigger-bubble-dot"></span>
      <span class="trigger-bubble-dot"></span>
      <span class="trigger-bubble-dot"></span>
    </span>
    <span class="trigger-close" aria-hidden="true"></span>
  </button>

  <!-- ── Ventana del chat ── -->
  <div id="chat-window" role="dialog" aria-label="Chat asistente">

    <div id="chat-header">
      <div class="header-avatar">nh<span class="avatar-dot">.</span></div>
      <div class="header-info">
        <!--
          header-name es un enlace mailto — se popula en main.js
          con el email del config.json. cursor: pointer sin hover en el header.
        -->
        <a class="header-name" id="header-name" href="#">Cargando...</a>
        <div class="header-status">
          <span class="status-dot"></span>
          <span>En línea ahora</span>
        </div>
      </div>
      <div class="header-actions">
        <!-- Solo la cruz es clickeable para cerrar -->
        <button class="header-btn" id="close-btn" title="Cerrar" aria-label="Cerrar chat">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="chat-messages" role="log" aria-live="polite"></div>

    <div id="chat-input-area">
      <div class="input-row">
        <textarea
          id="chat-input"
          placeholder="Escribí tu mensaje..."
          rows="1"
          maxlength="2000"
          aria-label="Mensaje"
        ></textarea>
        <button id="send-btn" aria-label="Enviar">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"
              stroke="hsl(240,10%,6%)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">Respuestas generadas por IA · Puede cometer errores</div>
    </div>

  </div>

  <!-- Módulos JS — theme.js eliminado del repositorio (su lógica vive en los scripts síncronos del head) -->
  <script type="module" src="./js/session.js"></script>
  <script type="module" src="./js/api.js"></script>
  <script type="module" src="./js/render.js"></script>
  <script type="module" src="./js/main.js"></script>

</body>
</html>
