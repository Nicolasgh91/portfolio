<!-- 1. ESTILOS -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');

  #nh-chat-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: conic-gradient(from 210deg, #1c1400, #0e0e0e 45%, #221a00 100%);
    border: 1.5px solid rgba(240,165,0,0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #nh-chat-btn:hover {
    transform: scale(1.1);
    border-color: rgba(240,165,0,0.75);
  }

  /* Anillo pulsante */
  #nh-chat-btn::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1.5px solid rgba(240,165,0,0.18);
    animation: nh-ring 2.6s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes nh-ring {
    0%,100% { opacity: 0.15; transform: scale(1); }
    50%      { opacity: 0.55; transform: scale(1.06); }
  }

  /* Logo tipográfico */
  #nh-chat-btn .nh-logo {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    color: #f5f5f0;
    letter-spacing: -0.04em;
    line-height: 1;
    pointer-events: none;
  }

  #nh-chat-btn .nh-logo-dot { color: #f0a500; }

  /* Burbuja con puntos */
  #nh-chat-btn .nh-bubble {
    width: 16px;
    height: 9px;
    background: #f0a500;
    border-radius: 4px 4px 4px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2.5px;
    pointer-events: none;
  }

  #nh-chat-btn .nh-bubble-dot {
    width: 2.5px;
    height: 2.5px;
    border-radius: 50%;
    background: #0e0e0e;
    animation: nh-typing 1.4s ease-in-out infinite;
  }

  #nh-chat-btn .nh-bubble-dot:nth-child(2) { animation-delay: 0.2s; }
  #nh-chat-btn .nh-bubble-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes nh-typing {
    0%,60%,100% { opacity: 0.4; transform: translateY(0); }
    30%          { opacity: 1;   transform: translateY(-2px); }
  }

  /* Estado abierto: muestra X */
  #nh-chat-btn.is-open .nh-logo,
  #nh-chat-btn.is-open .nh-bubble { display: none; }

  #nh-chat-btn .nh-close { display: none; }
  #nh-chat-btn.is-open .nh-close { display: block; }

  #nh-chat-btn .nh-close::before,
  #nh-chat-btn .nh-close::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 2px;
    background: #f0a500;
    border-radius: 1px;
    top: 50%;
    left: 50%;
  }

  #nh-chat-btn .nh-close::before { transform: translate(-50%, -50%) rotate(45deg); }
  #nh-chat-btn .nh-close::after  { transform: translate(-50%, -50%) rotate(-45deg); }

  #nh-chat-btn.is-open {
    background: conic-gradient(from 210deg, #2a1800, #1a1000 45%, #321f00 100%);
    border-color: rgba(240,165,0,0.7);
  }
</style>

<!-- 2. HTML -->
<button id="nh-chat-btn" aria-label="Abrir chat" onclick="nhToggleChat()">
  <span class="nh-logo">nh<span class="nh-logo-dot">.</span></span>
  <div class="nh-bubble">
    <div class="nh-bubble-dot"></div>
    <div class="nh-bubble-dot"></div>
    <div class="nh-bubble-dot"></div>
  </div>
  <span class="nh-close"></span>
</button>

<!-- 3. JS -->
<script>
  function nhToggleChat() {
    const btn = document.getElementById('nh-chat-btn');
    btn.classList.toggle('is-open');

    // ── Reemplazá este bloque con tu lógica de chat ──
    const isOpen = btn.classList.contains('is-open');
    if (isOpen) {
      // Abrir tu widget de chat aquí
      // Ej: window.Intercom('show') / window.Crisp.chat.open() / etc.
      console.log('Chat abierto');
    } else {
      // Cerrar tu widget de chat aquí
      console.log('Chat cerrado');
    }
  }
</script>
